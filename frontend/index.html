<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Resumatch — Match your resume to the right job</title>
    <meta
      name="description"
      content="Upload your resume, see how it scores against any job description, and get matched to roles that fit."
    />
    <meta name="theme-color" content="#f8f5f0" />
    <script>
      // Apply the stored theme before first paint to avoid a flash of the
      // wrong colour scheme.
      (function () {
        try {
          var stored = localStorage.getItem("resumatch.theme") || "system";
          var dark =
            stored === "dark" ||
            (stored === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
